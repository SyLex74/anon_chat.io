<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Мгновенный чат — Молниеносный обмен сообщениями</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #eef2fa;
            min-height: 100vh;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            overflow: hidden;
            will-change: transform;
        }

        .chat-wrapper {
            max-width: 800px;
            margin: 0 auto;
            height: 100vh;
            background: #ffffff;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.05);
        }

        .chat-card {
            background: #ffffff;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .login-container {
            padding: 2rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(145deg, #ffffff 0%, #f5f9ff 100%);
        }

        .login-icon {
            font-size: 4.5rem;
            text-align: center;
            color: #4680ff;
            margin-bottom: 1.2rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .login-title {
            font-weight: 700;
            font-size: 28px;
            color: #1a2c3e;
            margin-bottom: 2rem;
            text-align: center;
        }

        .custom-input {
            background: #f8fafd;
            border: 1.5px solid #e9edf2;
            border-radius: 20px;
            padding: 14px 20px;
            font-size: 1rem;
            transition: all 0.15s ease;
        }

        .custom-input:focus {
            background: #ffffff;
            border-color: #4680ff;
            box-shadow: 0 0 0 4px rgba(70, 128, 255, 0.12);
            outline: none;
        }

        .btn-primary-custom {
            background: #4680ff;
            border: none;
            border-radius: 30px;
            padding: 14px;
            font-weight: 600;
            color: white;
            transition: transform 0.1s ease;
            cursor: pointer;
        }

        .btn-primary-custom:active {
            transform: scale(0.97);
        }

        .chat-header-custom {
            background: #ffffff;
            padding: 12px 18px;
            border-bottom: 1px solid #eff3f8;
            flex-shrink: 0;
        }

        .user-badge {
            background: #f0f4fa;
            border-radius: 40px;
            padding: 6px 14px 6px 18px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1a2c3e;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.1s;
        }

        .user-badge:active {
            background: #e6ecf5;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #8e9eae;
            font-size: 0.9rem;
            padding: 6px 8px;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.1s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .logout-btn:active {
            background: #ffe8e8;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #fbfdff;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 78%;
            display: flex;
            flex-direction: column;
            position: relative;
            will-change: transform;
        }

        .message.new {
            animation: fadeSlideUp 0.1s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.selected {
            opacity: 0.6;
        }

        .message.selected .message-bubble {
            background: #ffe5e5 !important;
            border: 2px solid #ff6b6b !important;
        }

        .my-message {
            align-self: flex-end;
            align-items: flex-end;
        }

        .other-message {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 22px;
            word-break: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
            cursor: pointer;
            transition: background 0.05s;
        }

        .my-message .message-bubble {
            background: #4680ff;
            color: white;
            border-bottom-right-radius: 6px;
        }

        .other-message .message-bubble {
            background: #ffffff;
            color: #1f2a3e;
            border: 1px solid #e9edf2;
            border-bottom-left-radius: 6px;
        }

        .system-message {
            align-self: center;
            max-width: 85%;
        }

        .system-message .message-bubble {
            background: #eef2f8;
            font-size: 0.72rem;
            padding: 6px 16px;
            border-radius: 50px;
            color: #5e6f8d;
            cursor: default;
        }

        .message-meta {
            font-size: 0.6rem;
            color: #98a9bc;
            margin: 4px 12px 0;
            display: flex;
            gap: 8px;
        }

        .sender-name {
            font-size: 0.7rem;
            font-weight: 600;
            color: #4680ff;
            margin-bottom: 4px;
            margin-left: 12px;
            cursor: pointer;
        }

        .checkbox-overlay {
            position: absolute;
            left: -28px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px;
            height: 22px;
            background: white;
            border: 2px solid #4680ff;
            border-radius: 6px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
        }

        .my-message .checkbox-overlay {
            left: auto;
            right: -28px;
        }

        .message:hover .checkbox-overlay {
            display: flex;
        }

        .checkbox-overlay.checked {
            background: #4680ff;
        }

        .checkbox-overlay.checked i {
            color: white;
            font-size: 12px;
        }

        .chat-img {
            max-width: 220px;
            max-height: 220px;
            border-radius: 14px;
            cursor: pointer;
            object-fit: cover;
        }

        audio {
            max-width: 210px;
            height: 34px;
            border-radius: 30px;
        }

        .input-panel {
            background: #ffffff;
            border-top: 1px solid #eff3f8;
            padding: 12px 16px;
            gap: 8px;
            flex-shrink: 0;
        }

        .message-input-field {
            background: #f8fafd;
            border: 1.5px solid #e9edf2;
            border-radius: 30px;
            padding: 12px 18px;
            font-size: 0.95rem;
            flex: 1;
            transition: border 0.1s;
        }

        .message-input-field:focus {
            background: #ffffff;
            border-color: #4680ff;
            outline: none;
        }

        .icon-btn {
            background: #f0f4fa;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: transform 0.05s;
            color: #4680ff;
            flex-shrink: 0;
            cursor: pointer;
        }

        .icon-btn:active {
            transform: scale(0.94);
        }

        .send-btn {
            background: #4680ff;
            color: white;
        }

        .delete-multiple-btn {
            background: #ffe8e8;
            color: #e5484d;
        }

        .recording-active {
            background: #ff6b6b !important;
            color: white;
            animation: pulseMic 1s infinite;
        }

        @keyframes pulseMic {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.6); }
            70% { box-shadow: 0 0 0 8px rgba(255, 107, 107, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0); }
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #f0f4f9;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .media-btn {
            background: #f0f4fa;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            color: #4680ff;
            margin-left: 6px;
            cursor: pointer;
            transition: background 0.05s;
        }

        .media-btn:active {
            background: #e6ecf5;
        }

        .selection-toolbar {
            background: #ffffff;
            border-top: 1px solid #eff3f8;
            padding: 8px 16px;
            display: none;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .selection-toolbar.show {
            display: flex;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 400px;
            width: 90%;
            max-height: 70vh;
            overflow: auto;
        }

        .participant-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .participant-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #f0f4f9;
            cursor: pointer;
        }

        .participant-item:active {
            background: #f8faff;
        }

        .participant-avatar {
            width: 42px;
            height: 42px;
            background: #4680ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .photo-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2100;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .photo-modal img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 16px;
        }

        .preview-modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 20px;
            z-index: 2200;
            animation: slideUp 0.2s ease-out;
            max-width: 500px;
            margin: 0 auto;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .preview-modal img {
            width: 100%;
            max-height: 260px;
            object-fit: contain;
            border-radius: 16px;
            margin-bottom: 16px;
        }

        .preview-buttons {
            display: flex;
            gap: 12px;
        }

        .preview-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-send-photo {
            background: #4680ff;
            color: white;
        }

        @media (max-width: 600px) {
            .message { max-width: 88%; }
            .icon-btn { width: 42px; height: 42px; }
        }
    </style>
</head>
<body>

<div class="chat-wrapper">
    <div class="chat-card">
        <div id="loginPanel" class="login-container">
            <div class="login-icon">
                <i class="bi bi-chat-dots-fill"></i>
            </div>
            <h2 class="login-title">Общий чат</h2>
            <div class="mb-4">
                <input type="text" id="userName" class="form-control custom-input" placeholder="Ваше имя" autocomplete="off">
            </div>
            <button id="joinBtn" class="btn-primary-custom w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>Войти
            </button>
            <div id="loginError" class="alert alert-danger mt-3 p-2 text-center small" style="display: none;"></div>
        </div>

        <div id="chatContainer" style="display: none; flex-direction: column; height: 100%;">
            <div class="chat-header-custom d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-chat-fill" style="color: #4680ff;"></i>
                    <span class="fw-semibold">Чат</span>
                    <button id="participantsBtn" class="media-btn"><i class="bi bi-people-fill"></i></button>
                    <button id="openGalleryBtn" class="media-btn"><i class="bi bi-images"></i></button>
                </div>
                <div class="user-badge" id="currentUserName">
                    <i class="bi bi-person-circle me-1"></i><span>—</span>
                    <button id="logoutBtn" class="logout-btn"><i class="bi bi-door-closed"></i></button>
                </div>
            </div>

            <div id="messagesArea" class="messages-area"></div>

            <div id="selectionToolbar" class="selection-toolbar">
                <div class="selection-count">Выбрано: <span id="selectedCount">0</span></div>
                <div class="d-flex gap-2">
                    <button id="deleteSelectedBtn" class="icon-btn delete-multiple-btn">
                        <i class="bi bi-trash3-fill"></i>
                    </button>
                    <button id="cancelSelectionBtn" class="icon-btn">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
            </div>

            <div class="input-panel d-flex gap-2">
                <input type="text" id="messageInput" class="form-control message-input-field" placeholder="Сообщение..." autocomplete="off">
                <button id="sendMessageBtn" class="icon-btn send-btn"><i class="bi bi-send-fill"></i></button>
                <button id="sendPhotoBtn" class="icon-btn"><i class="bi bi-image"></i></button>
                <button id="recordVoiceBtn" class="icon-btn"><i class="bi bi-mic"></i></button>
                <input type="file" id="photoFileInput" accept="image/*" style="display: none;">
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ========== КОНФИГУРАЦИЯ ==========
        const BIN_ID = '69c26523c3097a1dd555230e';
        const API_KEY = '$2a$10$DnQSU0x63YAZHDztaj35IueTmiwt9AepLYHUhVZ/zxhjdJ6xWdcke';
        const STORAGE_KEY = 'chat_user_session';
        
        // ========== СОСТОЯНИЕ ==========
        let currentUser = { name: "" };
        let isLoggedIn = false;
        let pollingInterval = null;
        let messagesCache = [];
        let selectedMessages = new Set();
        let isSending = false;
        let lastLoadedCount = 0;
        
        // Медиа рекордер
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let streamRef = null;
        
        // DOM элементы
        const loginPanel = document.getElementById('loginPanel');
        const chatContainer = document.getElementById('chatContainer');
        const userNameInput = document.getElementById('userName');
        const joinBtn = document.getElementById('joinBtn');
        const loginErrorDiv = document.getElementById('loginError');
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendMessageBtn = document.getElementById('sendMessageBtn');
        const sendPhotoBtn = document.getElementById('sendPhotoBtn');
        const recordVoiceBtn = document.getElementById('recordVoiceBtn');
        const photoFileInput = document.getElementById('photoFileInput');
        const currentUserNameSpan = document.getElementById('currentUserName');
        const openGalleryBtn = document.getElementById('openGalleryBtn');
        const participantsBtn = document.getElementById('participantsBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const selectionToolbar = document.getElementById('selectionToolbar');
        const selectedCountSpan = document.getElementById('selectedCount');
        const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
        const cancelSelectionBtn = document.getElementById('cancelSelectionBtn');
        
        // ========== УТИЛИТЫ ==========
        const escapeHtml = (str) => {
            if (!str) return '';
            return str.replace(/[&<>]/g, (m) => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        };
        
        const formatLastSeen = (timestamp) => {
            if (!timestamp) return "неизвестно";
            const diff = Date.now() - timestamp;
            const minutes = Math.floor(diff / 60000);
            if (minutes < 1) return "онлайн";
            if (minutes < 60) return `${minutes} мин. назад`;
            if (minutes < 1440) return `${Math.floor(minutes / 60)} ч. назад`;
            return `${Math.floor(minutes / 1440)} дн. назад`;
        };
        
        const scrollToBottom = () => {
            if (messagesArea) {
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }
        };
        
        // ========== ОТРИСОВКА СООБЩЕНИЙ (виртуальная DOM) ==========
        let messageElementsCache = new Map();
        
        const createMessageElement = (msg) => {
            const isSystem = msg.type === 'system';
            const isMine = !isSystem && msg.senderName === currentUser.name;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSystem ? 'system-message' : (isMine ? 'my-message' : 'other-message')}`;
            messageDiv.dataset.messageId = msg.id;
            if (selectedMessages.has(msg.id)) messageDiv.classList.add('selected');
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            
            if (isSystem) {
                bubbleDiv.innerHTML = `<i class="bi bi-info-circle me-1"></i> ${escapeHtml(msg.text)}`;
                messageDiv.appendChild(bubbleDiv);
            } else {
                const checkbox = document.createElement('div');
                checkbox.className = `checkbox-overlay ${selectedMessages.has(msg.id) ? 'checked' : ''}`;
                checkbox.innerHTML = selectedMessages.has(msg.id) ? '<i class="bi bi-check"></i>' : '';
                checkbox.onclick = (e) => {
                    e.stopPropagation();
                    toggleMessageSelection(msg.id);
                };
                messageDiv.appendChild(checkbox);
                
                if (!isMine && msg.senderName) {
                    const nameSpan = document.createElement('div');
                    nameSpan.className = 'sender-name';
                    nameSpan.textContent = msg.senderName;
                    nameSpan.onclick = () => showUserInfo(msg.senderName);
                    messageDiv.appendChild(nameSpan);
                }
                
                const contentDiv = document.createElement('div');
                if (msg.type === 'text') {
                    contentDiv.textContent = msg.text;
                } else if (msg.type === 'image') {
                    const img = document.createElement('img');
                    img.src = msg.dataUrl;
                    img.className = 'chat-img';
                    img.onclick = (e) => {
                        e.stopPropagation();
                        showFullscreenImage(msg.dataUrl);
                    };
                    contentDiv.appendChild(img);
                    if (msg.caption) {
                        const cap = document.createElement('div');
                        cap.style.fontSize = '0.7rem';
                        cap.textContent = msg.caption;
                        contentDiv.appendChild(cap);
                    }
                } else if (msg.type === 'audio') {
                    const audioElem = document.createElement('audio');
                    audioElem.controls = true;
                    audioElem.src = msg.audioBase64 || '';
                    contentDiv.appendChild(audioElem);
                    if (msg.durationText) {
                        const durSpan = document.createElement('div');
                        durSpan.style.fontSize = '0.65rem';
                        durSpan.innerHTML = `<i class="bi bi-mic-fill"></i> ${msg.durationText}`;
                        contentDiv.appendChild(durSpan);
                    }
                }
                bubbleDiv.appendChild(contentDiv);
                messageDiv.appendChild(bubbleDiv);
                
                const timeSpan = document.createElement('div');
                timeSpan.className = 'message-meta';
                const date = new Date(msg.timestamp);
                const timeStr = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
                timeSpan.textContent = timeStr;
                messageDiv.appendChild(timeSpan);
            }
            
            return messageDiv;
        };
        
        // Оптимизированный рендер - только новые сообщения
        let pendingRender = false;
        const scheduleRender = () => {
            if (pendingRender) return;
            pendingRender = true;
            requestAnimationFrame(() => {
                renderNewMessagesOnly();
                pendingRender = false;
            });
        };
        
        let lastRenderedCount = 0;
        
        const renderNewMessagesOnly = () => {
            if (!messagesArea) return;
            const wasNearBottom = messagesArea.scrollHeight - messagesArea.scrollTop - messagesArea.clientHeight < 200;
            
            // Добавляем только новые сообщения
            for (let i = lastRenderedCount; i < messagesCache.length; i++) {
                const msg = messagesCache[i];
                if (!messageElementsCache.has(msg.id)) {
                    const element = createMessageElement(msg);
                    messageElementsCache.set(msg.id, element);
                    messagesArea.appendChild(element);
                }
            }
            lastRenderedCount = messagesCache.length;
            
            if (wasNearBottom) scrollToBottom();
        };
        
        const fullRender = () => {
            if (!messagesArea) return;
            messagesArea.innerHTML = '';
            messageElementsCache.clear();
            lastRenderedCount = 0;
            messagesCache.forEach(msg => {
                const element = createMessageElement(msg);
                messageElementsCache.set(msg.id, element);
                messagesArea.appendChild(element);
            });
            lastRenderedCount = messagesCache.length;
            scrollToBottom();
        };
        
        // ========== ЗАГРУЗКА СООБЩЕНИЙ (оптимизированная) ==========
        let isLoading = false;
        let lastFetchTime = 0;
        
        const loadMessages = async () => {
            if (isLoading) return;
            isLoading = true;
            
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY, 'X-Bin-Meta': 'false' },
                    cache: 'no-store'
                });
                
                if (!response.ok) throw new Error();
                const messages = await response.json();
                if (!Array.isArray(messages)) return;
                
                // Быстрое сравнение по количеству и последнему ID
                const newMessages = messages.filter(msg => !messageElementsCache.has(msg.id));
                
                if (newMessages.length > 0) {
                    messagesCache = messages;
                    scheduleRender();
                }
            } catch (error) {
                console.error('Load error:', error);
            } finally {
                isLoading = false;
            }
        };
        
        // ========== СОХРАНЕНИЕ ==========
        const saveAllMessages = async (messages) => {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify(messages)
                });
                return response.ok;
            } catch (error) {
                return false;
            }
        };
        
        // ========== ОТПРАВКА СООБЩЕНИЙ (мгновенная) ==========
        const sendTextMessage = async () => {
            if (isSending) return;
            const text = messageInput.value.trim();
            if (!text) return;
            
            messageInput.value = '';
            isSending = true;
            
            const tempId = `temp_${Date.now()}_${Math.random()}`;
            const message = {
                id: tempId,
                type: 'text',
                text: text,
                senderName: currentUser.name,
                timestamp: Date.now()
            };
            
            // Мгновенное добавление
            messagesCache.push(message);
            const element = createMessageElement(message);
            messageElementsCache.set(tempId, element);
            messagesArea.appendChild(element);
            scrollToBottom();
            lastRenderedCount = messagesCache.length;
            
            // Реальный ID
            const realId = `${Date.now()}_${Math.random()}`;
            const finalMessage = { ...message, id: realId };
            const index = messagesCache.findIndex(m => m.id === tempId);
            if (index !== -1) messagesCache[index] = finalMessage;
            
            // Обновляем ID в DOM
            const msgElement = document.querySelector(`.message[data-message-id="${tempId}"]`);
            if (msgElement) msgElement.dataset.messageId = realId;
            messageElementsCache.delete(tempId);
            messageElementsCache.set(realId, msgElement);
            
            const success = await saveAllMessages(messagesCache);
            if (!success) {
                messagesCache = messagesCache.filter(m => m.id !== realId);
                messageElementsCache.delete(realId);
                if (msgElement) msgElement.remove();
                alert('Ошибка отправки');
                messageInput.value = text;
            }
            
            isSending = false;
            messageInput.focus();
        };
        
        const addSystemMessage = async (text) => {
            const message = {
                id: `sys_${Date.now()}_${Math.random()}`,
                type: 'system',
                text: text,
                timestamp: Date.now()
            };
            messagesCache.push(message);
            const element = createMessageElement(message);
            messageElementsCache.set(message.id, element);
            messagesArea.appendChild(element);
            scrollToBottom();
            lastRenderedCount = messagesCache.length;
            await saveAllMessages(messagesCache);
        };
        
        // ========== МЕДИАФУНКЦИИ ==========
        const showFullscreenImage = (src) => {
            const modal = document.createElement('div');
            modal.className = 'photo-modal';
            const img = document.createElement('img');
            img.src = src;
            modal.appendChild(img);
            modal.onclick = () => modal.remove();
            document.body.appendChild(modal);
        };
        
        const showPhotoPreview = (file) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const modal = document.createElement('div');
                modal.className = 'preview-modal';
                modal.innerHTML = `
                    <img src="${e.target.result}">
                    <div class="preview-buttons">
                        <button class="btn-cancel-photo">Отмена</button>
                        <button class="btn-send-photo">Отправить</button>
                    </div>
                `;
                
                modal.querySelector('.btn-send-photo').onclick = async () => {
                    if (isSending) return;
                    isSending = true;
                    
                    const tempId = `temp_img_${Date.now()}_${Math.random()}`;
                    const message = {
                        id: tempId,
                        type: 'image',
                        dataUrl: e.target.result,
                        caption: file.name,
                        senderName: currentUser.name,
                        timestamp: Date.now()
                    };
                    
                    messagesCache.push(message);
                    const element = createMessageElement(message);
                    messageElementsCache.set(tempId, element);
                    messagesArea.appendChild(element);
                    scrollToBottom();
                    lastRenderedCount = messagesCache.length;
                    
                    const realId = `img_${Date.now()}_${Math.random()}`;
                    const finalMessage = { ...message, id: realId };
                    const index = messagesCache.findIndex(m => m.id === tempId);
                    if (index !== -1) messagesCache[index] = finalMessage;
                    
                    const msgElement = document.querySelector(`.message[data-message-id="${tempId}"]`);
                    if (msgElement) msgElement.dataset.messageId = realId;
                    messageElementsCache.delete(tempId);
                    messageElementsCache.set(realId, msgElement);
                    
                    const success = await saveAllMessages(messagesCache);
                    if (!success) {
                        messagesCache = messagesCache.filter(m => m.id !== realId);
                        messageElementsCache.delete(realId);
                        if (msgElement) msgElement.remove();
                        alert('Ошибка отправки фото');
                    }
                    
                    modal.remove();
                    isSending = false;
                };
                
                modal.querySelector('.btn-cancel-photo').onclick = () => modal.remove();
                document.body.appendChild(modal);
            };
            reader.readAsDataURL(file);
        };
        
        const sendPhoto = (file) => {
            if (!file || !file.type.startsWith('image/')) return alert('Выберите изображение');
            if (file.size > 5 * 1024 * 1024) return alert('Файл до 5 МБ');
            showPhotoPreview(file);
        };
        
        // ========== ГОЛОСОВЫЕ СООБЩЕНИЯ ==========
        const startRecording = async () => {
            if (isRecording) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                streamRef = stream;
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = async () => {
                    if (isSending) return;
                    isSending = true;
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const durationSec = Math.max(1, Math.min(60, Math.round(audioBlob.size / 18000)));
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const tempId = `temp_audio_${Date.now()}_${Math.random()}`;
                        const message = {
                            id: tempId,
                            type: 'audio',
                            audioBase64: reader.result,
                            durationText: `${durationSec} сек`,
                            senderName: currentUser.name,
                            timestamp: Date.now()
                        };
                        
                        messagesCache.push(message);
                        const element = createMessageElement(message);
                        messageElementsCache.set(tempId, element);
                        messagesArea.appendChild(element);
                        scrollToBottom();
                        lastRenderedCount = messagesCache.length;
                        
                        const realId = `audio_${Date.now()}_${Math.random()}`;
                        const finalMessage = { ...message, id: realId };
                        const index = messagesCache.findIndex(m => m.id === tempId);
                        if (index !== -1) messagesCache[index] = finalMessage;
                        
                        const msgElement = document.querySelector(`.message[data-message-id="${tempId}"]`);
                        if (msgElement) msgElement.dataset.messageId = realId;
                        messageElementsCache.delete(tempId);
                        messageElementsCache.set(realId, msgElement);
                        
                        const success = await saveAllMessages(messagesCache);
                        if (!success) {
                            messagesCache = messagesCache.filter(m => m.id !== realId);
                            messageElementsCache.delete(realId);
                            if (msgElement) msgElement.remove();
                            alert('Ошибка отправки голосового');
                        }
                        
                        if (streamRef) streamRef.getTracks().forEach(t => t.stop());
                        isSending = false;
                    };
                    reader.readAsDataURL(audioBlob);
                };
                mediaRecorder.start();
                isRecording = true;
                recordVoiceBtn.classList.add('recording-active');
                recordVoiceBtn.innerHTML = '<i class="bi bi-stop-fill"></i>';
                setTimeout(() => { if (isRecording) stopRecording(); }, 60000);
            } catch(err) {
                alert('Нет доступа к микрофону');
            }
        };
        
        const stopRecording = () => {
            if (mediaRecorder && isRecording && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                isRecording = false;
                recordVoiceBtn.classList.remove('recording-active');
                recordVoiceBtn.innerHTML = '<i class="bi bi-mic"></i>';
            }
        };
        
        const toggleRecording = () => {
            if (isRecording) stopRecording();
            else startRecording();
        };
        
        // ========== УЧАСТНИКИ И МЕДИА ==========
        const getUniqueParticipants = () => {
            const participants = new Map();
            messagesCache.forEach(msg => {
                if (msg.type !== 'system' && msg.senderName) {
                    if (!participants.has(msg.senderName)) {
                        participants.set(msg.senderName, msg.timestamp);
                    }
                }
            });
            return Array.from(participants.entries()).map(([name, lastSeen]) => ({ name, lastSeen }));
        };
        
        const showParticipants = () => {
            const participants = getUniqueParticipants();
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
                        <h5 class="m-0"><i class="bi bi-people-fill"></i> Участники (${participants.length})</h5>
                        <button class="btn-close" onclick="this.closest('.modal-overlay').remove()"></button>
                    </div>
                    <ul class="participant-list">
                        ${participants.map(p => `
                            <li class="participant-item" onclick="window.showUserInfo('${escapeHtml(p.name)}')">
                                <div class="participant-avatar"><i class="bi bi-person-fill text-white"></i></div>
                                <div>
                                    <div class="fw-semibold">${escapeHtml(p.name)}</div>
                                    <div class="small text-secondary">${formatLastSeen(p.lastSeen)}</div>
                                </div>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
            document.body.appendChild(modal);
        };
        
        window.showUserInfo = (userName) => {
            const participant = getUniqueParticipants().find(p => p.name === userName);
            const lastSeen = participant ? participant.lastSeen : Date.now();
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content text-center p-4" style="max-width: 280px;">
                    <div class="participant-avatar mx-auto mb-3" style="width: 70px; height: 70px;"><i class="bi bi-person-fill" style="font-size: 36px;"></i></div>
                    <h5>${escapeHtml(userName)}</h5>
                    <p class="text-secondary small mb-3">${formatLastSeen(lastSeen)}</p>
                    <button class="btn btn-sm btn-secondary" onclick="this.closest('.modal-overlay').remove()">Закрыть</button>
                </div>
            `;
            document.body.appendChild(modal);
        };
        
        const openMediaGallery = () => {
            const images = messagesCache.filter(msg => msg.type === 'image');
            if (images.length === 0) { alert('Нет медиафайлов'); return; }
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.style.background = 'white';
            modal.style.alignItems = 'flex-start';
            modal.innerHTML = `
                <div style="background: white; width: 100%; max-width: 600px; border-radius: 24px; margin: 20px; max-height: 85vh; overflow: auto;">
                    <div class="d-flex justify-content-between align-items-center p-3 border-bottom sticky-top bg-white">
                        <h5 class="m-0"><i class="bi bi-images"></i> Медиа (${images.length})</h5>
                        <button class="btn-close" onclick="this.closest('.modal-overlay').remove()"></button>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; padding: 16px;" id="galleryGrid"></div>
                </div>
            `;
            const grid = modal.querySelector('#galleryGrid');
            images.forEach(img => {
                const div = document.createElement('div');
                div.style.cursor = 'pointer';
                div.innerHTML = `<img src="${img.dataUrl}" style="width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px;">`;
                div.onclick = () => showFullscreenImage(img.dataUrl);
                grid.appendChild(div);
            });
            document.body.appendChild(modal);
        };
        
        // ========== ВЫБОР И УДАЛЕНИЕ ==========
        const toggleMessageSelection = (msgId) => {
            if (selectedMessages.has(msgId)) selectedMessages.delete(msgId);
            else selectedMessages.add(msgId);
            updateSelectionUI();
        };
        
        const updateSelectionUI = () => {
            const count = selectedMessages.size;
            selectedCountSpan.textContent = count;
            if (count > 0) selectionToolbar.classList.add('show');
            else selectionToolbar.classList.remove('show');
            
            document.querySelectorAll('.message').forEach(msgDiv => {
                const mid = msgDiv.dataset.messageId;
                if (selectedMessages.has(mid)) msgDiv.classList.add('selected');
                else msgDiv.classList.remove('selected');
            });
        };
        
        const deleteSelectedMessages = async () => {
            if (selectedMessages.size === 0) return;
            if (!confirm(`Удалить ${selectedMessages.size} сообщение(й)?`)) return;
            
            const newMessages = messagesCache.filter(msg => !selectedMessages.has(msg.id));
            const oldMessages = messagesCache;
            messagesCache = newMessages;
            
            const success = await saveAllMessages(messagesCache);
            if (success) {
                selectedMessages.clear();
                fullRender();
                updateSelectionUI();
            } else {
                messagesCache = oldMessages;
                alert('Ошибка при удалении');
            }
        };
        
        const cancelSelection = () => {
            selectedMessages.clear();
            updateSelectionUI();
        };
        
        // ========== АВТОРИЗАЦИЯ ==========
        const saveSession = () => {
            if (currentUser.name) localStorage.setItem(STORAGE_KEY, JSON.stringify({ name: currentUser.name }));
        };
        
        const loadSession = () => {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const session = JSON.parse(saved);
                    if (session.name) {
                        currentUser.name = session.name;
                        return true;
                    }
                } catch(e) {}
            }
            return false;
        };
        
        const clearSession = () => {
            localStorage.removeItem(STORAGE_KEY);
            currentUser.name = "";
            isLoggedIn = false;
            if (pollingInterval) clearInterval(pollingInterval);
            loginPanel.style.display = 'flex';
            chatContainer.style.display = 'none';
            selectedMessages.clear();
            selectionToolbar.classList.remove('show');
            messagesCache = [];
            messageElementsCache.clear();
            lastRenderedCount = 0;
            if (messagesArea) messagesArea.innerHTML = '';
        };
        
        const handleLogin = async () => {
            const name = userNameInput.value.trim();
            if (!name) {
                loginErrorDiv.textContent = 'Введите имя';
                loginErrorDiv.style.display = 'block';
                setTimeout(() => loginErrorDiv.style.display = 'none', 1500);
                return;
            }
            currentUser.name = name;
            isLoggedIn = true;
            currentUserNameSpan.querySelector('span').innerHTML = escapeHtml(currentUser.name);
            saveSession();
            loginPanel.style.display = 'none';
            chatContainer.style.display = 'flex';
            await loadMessages();
            await addSystemMessage(`${currentUser.name} присоединился`);
            startPolling();
            messageInput.focus();
        };
        
        const handleLogout = async () => {
            if (confirm('Выйти из чата?')) {
                await addSystemMessage(`${currentUser.name} покинул чат`);
                clearSession();
            }
        };
        
        const startPolling = () => {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(() => {
                if (isLoggedIn) loadMessages();
            }, 400); // Максимальная скорость 400ms
        };
        
        const autoLogin = async () => {
            if (loadSession()) {
                currentUser.name = JSON.parse(localStorage.getItem(STORAGE_KEY)).name;
                isLoggedIn = true;
                currentUserNameSpan.querySelector('span').innerHTML = escapeHtml(currentUser.name);
                loginPanel.style.display = 'none';
                chatContainer.style.display = 'flex';
                await loadMessages();
                await addSystemMessage(`${currentUser.name} вернулся`);
                startPolling();
                messageInput.focus();
            }
        };
        
        // ========== НАСТРОЙКА СОБЫТИЙ ==========
        joinBtn.addEventListener('click', handleLogin);
        userNameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
        sendMessageBtn.onclick = sendTextMessage;
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendTextMessage(); });
        sendPhotoBtn.onclick = () => photoFileInput.click();
        photoFileInput.addEventListener('change', (e) => { if (e.target.files?.[0]) sendPhoto(e.target.files[0]); photoFileInput.value = ''; });
        recordVoiceBtn.addEventListener('click', toggleRecording);
        openGalleryBtn.addEventListener('click', openMediaGallery);
        participantsBtn.addEventListener('click', showParticipants);
        logoutBtn.addEventListener('click', handleLogout);
        deleteSelectedBtn.addEventListener('click', deleteSelectedMessages);
        cancelSelectionBtn.addEventListener('click', cancelSelection);
        currentUserNameSpan.addEventListener('click', () => window.showUserInfo(currentUser.name));
        
        // Запуск
        autoLogin();
    })();
</script>
</body>
</html>
