<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Общий чат — Единый чат для всех</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e5e9f0;
            min-height: 100vh;
            font-family: -apple-system, system-ui, 'Segoe UI', 'Helvetica Neue', Roboto, 'Inter', sans-serif;
            overflow: hidden;
        }

        .chat-wrapper {
            max-width: 800px;
            margin: 0 auto;
            height: 100vh;
            background: #ffffff;
        }

        .chat-card {
            background: #ffffff;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .login-container {
            padding: 2rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(135deg, #ffffff 0%, #f8faff 100%);
        }

        .login-icon {
            font-size: 4rem;
            text-align: center;
            color: #4680ff;
            margin-bottom: 1rem;
        }

        .login-title {
            font-weight: 600;
            font-size: 28px;
            color: #1e2a3e;
            margin-bottom: 2rem;
            text-align: center;
        }

        .custom-input {
            background: #f4f7fb;
            border: 1px solid #e1e8ed;
            color: #1e2a3e;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 1rem;
        }

        .custom-input:focus {
            background: #ffffff;
            border-color: #4680ff;
            box-shadow: 0 0 0 3px rgba(70, 128, 255, 0.1);
            outline: none;
        }

        .btn-primary-custom {
            background: #4680ff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 600;
            color: white;
        }

        .btn-primary-custom:hover {
            background: #3366cc;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #8e9eae;
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 8px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #f0f4f9;
            color: #ff4444;
        }

        .chat-header-custom {
            background: #ffffff;
            padding: 12px 16px;
            border-bottom: 1px solid #eef2f7;
        }

        .user-badge {
            background: #f0f4f9;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e2a3e;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 8px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f8faff;
        }

        .message {
            max-width: 75%;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.1s ease-out;
            position: relative;
            transition: all 0.2s;
        }

        .message.selected {
            opacity: 0.6;
        }

        .message.selected .message-bubble {
            background: #ffe5e5 !important;
            border: 2px solid #ff4444 !important;
        }

        .my-message {
            align-self: flex-end;
            align-items: flex-end;
        }

        .other-message {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-bubble {
            padding: 8px 12px;
            border-radius: 18px;
            word-break: break-word;
            font-size: 0.9375rem;
            line-height: 1.4;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }

        .my-message .message-bubble {
            background: #4680ff;
            color: white;
            border-bottom-right-radius: 6px;
        }

        .other-message .message-bubble {
            background: #ffffff;
            color: #1e2a3e;
            border: 1px solid #e1e8ed;
            border-bottom-left-radius: 6px;
        }

        .system-message {
            align-self: center;
            max-width: 85%;
        }

        .system-message .message-bubble {
            background: #eef2f7;
            font-size: 0.75rem;
            padding: 6px 14px;
            border-radius: 20px;
            color: #5e6f8d;
            cursor: default;
        }

        .message-meta {
            font-size: 0.65rem;
            color: #8e9eae;
            margin: 4px 10px 0;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .edited-badge {
            font-size: 0.6rem;
            opacity: 0.7;
            font-style: italic;
        }

        .sender-name {
            font-size: 0.7rem;
            font-weight: 600;
            color: #4680ff;
            margin-bottom: 4px;
            margin-left: 12px;
            cursor: pointer;
        }

        .checkbox-overlay {
            position: absolute;
            left: -25px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            background: white;
            border: 2px solid #4680ff;
            border-radius: 4px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .my-message .checkbox-overlay {
            left: auto;
            right: -25px;
        }

        .message:hover .checkbox-overlay {
            display: flex;
        }

        .checkbox-overlay.checked {
            background: #4680ff;
        }

        .checkbox-overlay.checked i {
            color: white;
            font-size: 12px;
        }

        .chat-img {
            max-width: 260px;
            max-height: 260px;
            border-radius: 12px;
            cursor: pointer;
            object-fit: cover;
        }

        audio {
            max-width: 240px;
            height: 36px;
            border-radius: 20px;
        }

        .input-panel {
            background: #ffffff;
            border-top: 1px solid #eef2f7;
            padding: 12px 16px;
            gap: 8px;
        }

        .message-input-field {
            background: #f4f7fb;
            border: 1px solid #e1e8ed;
            border-radius: 24px;
            padding: 10px 16px;
            color: #1e2a3e;
            font-size: 0.9375rem;
            flex: 1;
        }

        .message-input-field:focus {
            background: #ffffff;
            border-color: #4680ff;
            outline: none;
        }

        .icon-btn {
            background: #f4f7fb;
            border: 1px solid #e1e8ed;
            width: 42px;
            height: 42px;
            border-radius: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.15s;
            color: #4680ff;
            flex-shrink: 0;
        }

        .send-btn {
            background: #4680ff;
            border: none;
            color: white;
        }

        .delete-multiple-btn {
            background: #ff4444;
            color: white;
            border: none;
        }

        .recording-active {
            background: #ff4444 !important;
            animation: pulseMic 1s infinite;
        }

        @keyframes pulseMic {
            0% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.5); }
            70% { box-shadow: 0 0 0 8px rgba(255, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .status-online {
            font-size: 0.7rem;
            color: #4680ff;
        }

        .media-btn {
            background: #f0f4f9;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #4680ff;
            margin-left: 8px;
            cursor: pointer;
        }

        .selection-toolbar {
            background: #ffffff;
            border-top: 1px solid #eef2f7;
            padding: 8px 16px;
            display: none;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .selection-toolbar.show {
            display: flex;
        }

        .selection-count {
            font-size: 14px;
            color: #1e2a3e;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow: auto;
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid #eef2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .participant-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .participant-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eef2f7;
            cursor: pointer;
        }

        .participant-item:hover {
            background: #f8faff;
        }

        .participant-avatar {
            width: 40px;
            height: 40px;
            background: #4680ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }

        .participant-avatar i {
            color: white;
            font-size: 20px;
        }

        .photo-modal, .gallery-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .photo-modal img {
            max-width: 90vw;
            max-height: 90vh;
        }

        .gallery-modal {
            background: white;
            flex-direction: column;
            cursor: default;
        }

        .gallery-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
        }

        .gallery-item {
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            z-index: 1500;
            animation: slideUp 0.25s;
            max-width: 500px;
            margin: 0 auto;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .preview-modal img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .preview-buttons {
            display: flex;
            gap: 12px;
        }

        .preview-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 500;
        }

        .btn-send-photo {
            background: #4680ff;
            color: white;
        }

        @media (max-width: 600px) {
            .message { max-width: 85%; }
            .icon-btn { width: 38px; height: 38px; }
        }
    </style>
</head>
<body>

<div class="chat-wrapper">
    <div class="chat-card">
        <div id="loginPanel" class="login-container">
            <div class="login-icon">
                <i class="bi bi-chat-dots-fill"></i>
            </div>
            <h2 class="login-title">Общий чат</h2>
            <div class="mb-4">
                <input type="text" id="userName" class="form-control custom-input" placeholder="Введите ваше имя" autocomplete="off">
            </div>
            <button id="joinBtn" class="btn-primary-custom w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>Войти
            </button>
            <div id="loginError" class="alert alert-danger mt-3 p-2 text-center small" style="display: none;"></div>
        </div>

        <div id="chatContainer" style="display: none; flex-direction: column; height: 100%;">
            <div class="chat-header-custom d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-chat-fill" style="color: #4680ff;"></i>
                    <span class="fw-semibold">Общий чат</span>
                    <button id="participantsBtn" class="media-btn"><i class="bi bi-people-fill"></i> Участники</button>
                    <button id="openGalleryBtn" class="media-btn"><i class="bi bi-images"></i> Медиа</button>
                    <span class="status-online"><i class="bi bi-circle-fill" style="font-size: 8px;"></i> онлайн</span>
                </div>
                <div class="user-badge" id="currentUserName">
                    <i class="bi bi-person-circle me-1"></i><span>—</span>
                    <button id="logoutBtn" class="logout-btn"><i class="bi bi-box-arrow-right"></i></button>
                </div>
            </div>

            <div id="messagesArea" class="messages-area"></div>

            <div id="selectionToolbar" class="selection-toolbar">
                <div class="selection-count">Выбрано: <span id="selectedCount">0</span></div>
                <button id="deleteSelectedBtn" class="icon-btn delete-multiple-btn">
                    <i class="bi bi-trash-fill"></i> Удалить
                </button>
                <button id="cancelSelectionBtn" class="icon-btn">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>

            <div class="input-panel d-flex gap-2">
                <input type="text" id="messageInput" class="form-control message-input-field" placeholder="Сообщение" autocomplete="off">
                <button id="sendMessageBtn" class="icon-btn send-btn"><i class="bi bi-send-fill"></i></button>
                <button id="sendPhotoBtn" class="icon-btn"><i class="bi bi-image"></i></button>
                <button id="recordVoiceBtn" class="icon-btn"><i class="bi bi-mic"></i></button>
                <input type="file" id="photoFileInput" accept="image/*" style="display: none;">
            </div>
        </div>
    </div>
</div>

<script>
    const BIN_ID = '69c26523c3097a1dd555230e';
    const API_KEY = '$2a$10$DnQSU0x63YAZHDztaj35IueTmiwt9AepLYHUhVZ/zxhjdJ6xWdcke';
    const STORAGE_KEY = 'chat_user_session';
    
    let currentUser = { name: "" };
    let isLoggedIn = false;
    let pollingInterval = null;
    let messagesCache = [];
    let isSending = false; // Флаг для предотвращения дублирования отправки
    let pendingMessages = []; // Очередь сообщений для отправки
    
    let selectedMessages = new Set();
    let selectionMode = false;
    
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let streamRef = null;
    
    const loginPanel = document.getElementById('loginPanel');
    const chatContainer = document.getElementById('chatContainer');
    const userNameInput = document.getElementById('userName');
    const joinBtn = document.getElementById('joinBtn');
    const loginErrorDiv = document.getElementById('loginError');
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendMessageBtn = document.getElementById('sendMessageBtn');
    const sendPhotoBtn = document.getElementById('sendPhotoBtn');
    const recordVoiceBtn = document.getElementById('recordVoiceBtn');
    const photoFileInput = document.getElementById('photoFileInput');
    const currentUserNameSpan = document.getElementById('currentUserName');
    const openGalleryBtn = document.getElementById('openGalleryBtn');
    const participantsBtn = document.getElementById('participantsBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const selectionToolbar = document.getElementById('selectionToolbar');
    const selectedCountSpan = document.getElementById('selectedCount');
    const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
    const cancelSelectionBtn = document.getElementById('cancelSelectionBtn');
    
    function saveSession() {
        if (currentUser.name) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ name: currentUser.name }));
        }
    }
    
    function loadSession() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                const session = JSON.parse(saved);
                if (session.name) {
                    currentUser.name = session.name;
                    return true;
                }
            } catch(e) {}
        }
        return false;
    }
    
    function clearSession() {
        localStorage.removeItem(STORAGE_KEY);
        currentUser.name = "";
        isLoggedIn = false;
        if (pollingInterval) clearInterval(pollingInterval);
        loginPanel.style.display = 'flex';
        chatContainer.style.display = 'none';
        selectedMessages.clear();
        selectionToolbar.classList.remove('show');
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatLastSeen(timestamp) {
        if (!timestamp) return "неизвестно";
        const diff = Date.now() - timestamp;
        const minutes = Math.floor(diff / 60000);
        if (minutes < 1) return "онлайн";
        if (minutes < 60) return `был(а) ${minutes} мин. назад`;
        if (minutes < 1440) return `был(а) ${Math.floor(minutes / 60)} ч. назад`;
        return `был(а) ${Math.floor(minutes / 1440)} дн. назад`;
    }
    
    function getUniqueParticipants() {
        const participants = new Map();
        messagesCache.forEach(msg => {
            if (msg.type !== 'system' && msg.senderName) {
                if (!participants.has(msg.senderName)) {
                    participants.set(msg.senderName, msg.timestamp);
                }
            }
        });
        return Array.from(participants.entries()).map(([name, lastSeen]) => ({ name, lastSeen }));
    }
    
    function showParticipants() {
        const participants = getUniqueParticipants();
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content">
                <div class="modal-header">
                    <h3><i class="bi bi-people-fill"></i> Участники чата (${participants.length})</h3>
                    <button class="close-modal" onclick="this.closest('.modal-overlay').remove()"><i class="bi bi-x-lg"></i></button>
                </div>
                <div class="modal-body">
                    <ul class="participant-list">
                        ${participants.map(p => `
                            <li class="participant-item" onclick="showUserInfo('${escapeHtml(p.name)}')">
                                <div class="participant-avatar"><i class="bi bi-person-fill"></i></div>
                                <div class="participant-info">
                                    <div class="participant-name">${escapeHtml(p.name)}</div>
                                    <div class="participant-status">${formatLastSeen(p.lastSeen)}</div>
                                </div>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    }
    
    function showUserInfo(userName) {
        const participant = getUniqueParticipants().find(p => p.name === userName);
        const lastSeen = participant ? participant.lastSeen : Date.now();
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content" style="max-width: 300px; text-align: center;">
                <div class="modal-header">
                    <h3>${escapeHtml(userName)}</h3>
                    <button class="close-modal" onclick="this.closest('.modal-overlay').remove()"><i class="bi bi-x-lg"></i></button>
                </div>
                <div class="modal-body">
                    <div class="participant-avatar" style="width: 80px; height: 80px; margin: 0 auto 16px;">
                        <i class="bi bi-person-fill" style="font-size: 40px;"></i>
                    </div>
                    <div class="participant-status">${formatLastSeen(lastSeen)}</div>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    }
    
    async function loadMessages() {
        try {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY, 'X-Bin-Meta': 'false' }
            });
            if (!response.ok) throw new Error();
            const messages = await response.json();
            if (!Array.isArray(messages)) return;
            
            // Проверяем, изменились ли сообщения
            const currentIds = messagesCache.map(m => m.id).join(',');
            const newIds = messages.map(m => m.id).join(',');
            
            if (currentIds !== newIds) {
                messagesCache = messages;
                renderAllMessages();
            }
        } catch (error) {
            console.error('Load error:', error);
        }
    }
    
    function renderAllMessages() {
        if (!messagesArea) return;
        const isNearBottom = messagesArea.scrollHeight - messagesArea.scrollTop - messagesArea.clientHeight < 100;
        messagesArea.innerHTML = '';
        
        if (messagesCache.length === 0) {
            messagesArea.innerHTML = '<div class="system-message message"><div class="message-bubble">✨ Напишите первое сообщение</div></div>';
        } else {
            messagesCache.forEach(msg => appendMessageElement(msg));
        }
        
        if (isNearBottom) scrollToBottom();
    }
    
    function toggleMessageSelection(messageId, event) {
        event.stopPropagation();
        if (selectedMessages.has(messageId)) {
            selectedMessages.delete(messageId);
        } else {
            selectedMessages.add(messageId);
        }
        updateSelectionUI();
    }
    
    function updateSelectionUI() {
        const count = selectedMessages.size;
        selectedCountSpan.textContent = count;
        
        if (count > 0) {
            selectionToolbar.classList.add('show');
        } else {
            selectionToolbar.classList.remove('show');
        }
        
        document.querySelectorAll('.message').forEach(msgDiv => {
            const msgId = msgDiv.dataset.messageId;
            if (selectedMessages.has(msgId)) {
                msgDiv.classList.add('selected');
            } else {
                msgDiv.classList.remove('selected');
            }
        });
    }
    
    async function deleteSelectedMessages() {
        if (selectedMessages.size === 0) return;
        
        if (confirm(`Удалить ${selectedMessages.size} сообщение(й)?`)) {
            const newMessages = messagesCache.filter(msg => !selectedMessages.has(msg.id));
            messagesCache = newMessages;
            
            const success = await saveAllMessages(messagesCache);
            if (success) {
                selectedMessages.clear();
                updateSelectionUI();
                renderAllMessages();
            } else {
                alert('Ошибка при удалении');
                await loadMessages(); // Восстанавливаем при ошибке
            }
        }
    }
    
    function cancelSelection() {
        selectedMessages.clear();
        updateSelectionUI();
    }
    
    function appendMessageElement(msg) {
        const isSystem = msg.type === 'system';
        const isMine = !isSystem && msg.senderName === currentUser.name;
        
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message');
        messageDiv.dataset.messageId = msg.id;
        
        if (isSystem) {
            messageDiv.classList.add('system-message');
        } else {
            messageDiv.classList.add(isMine ? 'my-message' : 'other-message');
        }
        
        if (selectedMessages.has(msg.id)) {
            messageDiv.classList.add('selected');
        }
        
        const bubbleDiv = document.createElement('div');
        bubbleDiv.classList.add('message-bubble');
        
        if (isSystem) {
            bubbleDiv.innerHTML = `<i class="bi bi-info-circle-fill me-1"></i> ${escapeHtml(msg.text)}`;
            messageDiv.appendChild(bubbleDiv);
        } else {
            const checkbox = document.createElement('div');
            checkbox.className = `checkbox-overlay ${selectedMessages.has(msg.id) ? 'checked' : ''}`;
            checkbox.innerHTML = selectedMessages.has(msg.id) ? '<i class="bi bi-check"></i>' : '';
            checkbox.onclick = (e) => toggleMessageSelection(msg.id, e);
            messageDiv.appendChild(checkbox);
            
            if (!isMine && msg.senderName) {
                const nameSpan = document.createElement('div');
                nameSpan.className = 'sender-name';
                nameSpan.innerHTML = escapeHtml(msg.senderName);
                nameSpan.onclick = () => showUserInfo(msg.senderName);
                messageDiv.appendChild(nameSpan);
            }
            
            const contentDiv = document.createElement('div');
            
            if (msg.type === 'text') {
                contentDiv.innerText = msg.text;
            } else if (msg.type === 'image') {
                const img = document.createElement('img');
                img.src = msg.dataUrl;
                img.classList.add('chat-img');
                img.onclick = (e) => {
                    e.stopPropagation();
                    showFullscreenImage(msg.dataUrl);
                };
                contentDiv.appendChild(img);
                if (msg.caption) {
                    const cap = document.createElement('div');
                    cap.style.fontSize = '0.65rem';
                    cap.innerText = msg.caption;
                    contentDiv.appendChild(cap);
                }
            } else if (msg.type === 'audio') {
                const audioElem = document.createElement('audio');
                audioElem.controls = true;
                audioElem.src = msg.audioBase64 || '';
                contentDiv.appendChild(audioElem);
                if (msg.durationText) {
                    const durSpan = document.createElement('div');
                    durSpan.style.fontSize = '0.65rem';
                    durSpan.innerHTML = `<i class="bi bi-mic-fill"></i> ${msg.durationText}`;
                    contentDiv.appendChild(durSpan);
                }
            }
            
            bubbleDiv.appendChild(contentDiv);
            
            if (msg.edited) {
                const editedSpan = document.createElement('div');
                editedSpan.className = 'edited-badge';
                editedSpan.innerText = '(изменено)';
                bubbleDiv.appendChild(editedSpan);
            }
            
            messageDiv.appendChild(bubbleDiv);
            
            const timeSpan = document.createElement('div');
            timeSpan.classList.add('message-meta');
            const date = new Date(msg.timestamp);
            const timeStr = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
            timeSpan.innerHTML = timeStr;
            messageDiv.appendChild(timeSpan);
        }
        
        messagesArea.appendChild(messageDiv);
    }
    
    function scrollToBottom() {
        setTimeout(() => {
            if (messagesArea) messagesArea.scrollTop = messagesArea.scrollHeight;
        }, 50);
    }
    
    async function saveAllMessages(messages) {
        try {
            const updateResponse = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(messages)
            });
            return updateResponse.ok;
        } catch (error) {
            console.error('Save error:', error);
            return false;
        }
    }
    
    // Улучшенная отправка сообщения с блокировкой дублирования
    async function sendTextMessage() {
        if (isSending) {
            console.log('Already sending, please wait');
            return;
        }
        
        const text = messageInput.value.trim();
        if (!text) return;
        
        // Очищаем поле ввода сразу, чтобы избежать повторной отправки
        messageInput.value = '';
        isSending = true;
        
        const message = {
            id: Date.now() + '_' + Math.random(),
            type: 'text',
            text: text,
            senderName: currentUser.name,
            timestamp: Date.now()
        };
        
        // Временно добавляем сообщение в кэш для отображения
        messagesCache.push(message);
        renderAllMessages();
        scrollToBottom();
        
        // Пытаемся сохранить
        const success = await saveAllMessages(messagesCache);
        
        if (!success) {
            // Если не удалось сохранить, удаляем из кэша и показываем ошибку
            messagesCache = messagesCache.filter(m => m.id !== message.id);
            renderAllMessages();
            alert('Ошибка отправки сообщения. Попробуйте еще раз.');
            // Возвращаем текст в поле ввода
            messageInput.value = text;
        }
        
        isSending = false;
        messageInput.focus();
    }
    
    async function addSystemMessage(text) {
        const message = {
            id: Date.now() + '_sys_' + Math.random(),
            type: 'system',
            text: text,
            timestamp: Date.now()
        };
        messagesCache.push(message);
        await saveAllMessages(messagesCache);
        renderAllMessages();
        scrollToBottom();
    }
    
    function showFullscreenImage(src) {
        const modal = document.createElement('div');
        modal.className = 'photo-modal';
        const img = document.createElement('img');
        img.src = src;
        modal.appendChild(img);
        modal.onclick = () => modal.remove();
        document.body.appendChild(modal);
    }
    
    function openMediaGallery() {
        const images = messagesCache.filter(msg => msg.type === 'image');
        if (images.length === 0) {
            alert('Нет медиафайлов');
            return;
        }
        const modal = document.createElement('div');
        modal.className = 'gallery-modal';
        modal.innerHTML = `
            <div style="padding: 16px; border-bottom: 1px solid #eef2f7; display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0;"><i class="bi bi-images"></i> Все медиа (${images.length})</h3>
                <button class="close-modal" style="background: none; border: none; font-size: 24px;" onclick="this.closest('.gallery-modal').remove()"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="gallery-content" id="galleryContent"></div>
        `;
        const content = modal.querySelector('#galleryContent');
        images.forEach(img => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            item.innerHTML = `<img src="${img.dataUrl}" alt="photo">`;
            item.onclick = () => showFullscreenImage(img.dataUrl);
            content.appendChild(item);
        });
        document.body.appendChild(modal);
    }
    
    function showPhotoPreview(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const modal = document.createElement('div');
            modal.className = 'preview-modal';
            modal.innerHTML = `
                <img src="${e.target.result}">
                <div class="preview-buttons">
                    <button class="btn-cancel-photo" style="background: #f0f4f9;">Отмена</button>
                    <button class="btn-send-photo">Отправить</button>
                </div>
            `;
            modal.querySelector('.btn-send-photo').onclick = async () => {
                if (isSending) return;
                isSending = true;
                
                const message = {
                    id: Date.now() + '_img_' + Math.random(),
                    type: 'image',
                    dataUrl: e.target.result,
                    caption: file.name,
                    senderName: currentUser.name,
                    timestamp: Date.now()
                };
                messagesCache.push(message);
                const success = await saveAllMessages(messagesCache);
                if (success) {
                    renderAllMessages();
                    scrollToBottom();
                } else {
                    messagesCache = messagesCache.filter(m => m.id !== message.id);
                    alert('Ошибка отправки фото');
                }
                modal.remove();
                isSending = false;
            };
            modal.querySelector('.btn-cancel-photo').onclick = () => modal.remove();
            document.body.appendChild(modal);
        };
        reader.readAsDataURL(file);
    }
    
    async function sendPhoto(file) {
        if (!file || !file.type.startsWith('image/')) return alert('Выберите изображение');
        if (file.size > 5 * 1024 * 1024) return alert('Файл до 5 МБ');
        showPhotoPreview(file);
    }
    
    async function startRecording() {
        if (isRecording) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            streamRef = stream;
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
            mediaRecorder.onstop = async () => {
                if (isSending) return;
                isSending = true;
                
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const durationSec = Math.max(1, Math.min(60, Math.round(audioBlob.size / 18000)));
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const message = {
                        id: Date.now() + '_audio_' + Math.random(),
                        type: 'audio',
                        audioBase64: reader.result,
                        durationText: `${durationSec} сек`,
                        senderName: currentUser.name,
                        timestamp: Date.now()
                    };
                    messagesCache.push(message);
                    const success = await saveAllMessages(messagesCache);
                    if (success) {
                        renderAllMessages();
                        scrollToBottom();
                    } else {
                        messagesCache = messagesCache.filter(m => m.id !== message.id);
                        alert('Ошибка отправки голосового сообщения');
                    }
                    if (streamRef) streamRef.getTracks().forEach(t => t.stop());
                    isSending = false;
                };
                reader.readAsDataURL(audioBlob);
            };
            mediaRecorder.start();
            isRecording = true;
            recordVoiceBtn.classList.add('recording-active');
            recordVoiceBtn.innerHTML = '<i class="bi bi-stop-fill"></i>';
            setTimeout(() => { if (isRecording) stopRecording(); }, 60000);
        } catch (err) {
            alert('Нет доступа к микрофону');
        }
    }
    
    function stopRecording() {
        if (mediaRecorder && isRecording && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            isRecording = false;
            recordVoiceBtn.classList.remove('recording-active');
            recordVoiceBtn.innerHTML = '<i class="bi bi-mic"></i>';
        }
    }
    
    function toggleRecording() {
        if (isRecording) stopRecording();
        else startRecording();
    }
    
    function startPolling() {
        if (pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(async () => {
            if (isLoggedIn) {
                await loadMessages();
            }
        }, 800);
    }
    
    async function handleLogin() {
        const name = userNameInput.value.trim();
        if (!name) {
            loginErrorDiv.textContent = 'Введите имя';
            loginErrorDiv.style.display = 'block';
            setTimeout(() => loginErrorDiv.style.display = 'none', 3000);
            return;
        }
        
        currentUser.name = name;
        isLoggedIn = true;
        currentUserNameSpan.querySelector('span').innerHTML = escapeHtml(currentUser.name);
        saveSession();
        
        loginPanel.style.display = 'none';
        chatContainer.style.display = 'flex';
        
        await loadMessages();
        await addSystemMessage(`${currentUser.name} присоединился к чату`);
        startPolling();
        messageInput.focus();
    }
    
    async function handleLogout() {
        if (confirm('Выйти из чата?')) {
            await addSystemMessage(`${currentUser.name} покинул чат`);
            clearSession();
        }
    }
    
    async function autoLogin() {
        if (loadSession()) {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
            currentUser.name = saved.name;
            isLoggedIn = true;
            currentUserNameSpan.querySelector('span').innerHTML = escapeHtml(currentUser.name);
            loginPanel.style.display = 'none';
            chatContainer.style.display = 'flex';
            await loadMessages();
            await addSystemMessage(`${currentUser.name} вернулся в чат`);
            startPolling();
            messageInput.focus();
        }
    }
    
    // Event listeners
    joinBtn.addEventListener('click', handleLogin);
    userNameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
    sendMessageBtn.onclick = () => sendTextMessage();
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendTextMessage(); });
    sendPhotoBtn.addEventListener('click', () => photoFileInput.click());
    photoFileInput.addEventListener('change', (e) => {
        if (e.target.files?.[0]) sendPhoto(e.target.files[0]);
        photoFileInput.value = '';
    });
    recordVoiceBtn.addEventListener('click', toggleRecording);
    openGalleryBtn.addEventListener('click', openMediaGallery);
    participantsBtn.addEventListener('click', showParticipants);
    logoutBtn.addEventListener('click', handleLogout);
    deleteSelectedBtn.addEventListener('click', deleteSelectedMessages);
    cancelSelectionBtn.addEventListener('click', cancelSelection);
    currentUserNameSpan.addEventListener('click', () => showUserInfo(currentUser.name));
    
    window.showUserInfo = showUserInfo;
    
    autoLogin();
</script>
</body>
